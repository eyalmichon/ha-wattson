name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  manifest_bump:
    name: manifest_bump
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Get version
        uses: home-assistant/actions/helpers/version@master
        id: version

      - name: Bump manifest and create zip
        run: |
          version="${{ steps.version.outputs.version }}"
          version="${version#v}"
          sed -i 's/"version": ".*"/"version": "'"${version}"'"/' custom_components/wattson/manifest.json
          cd custom_components/wattson/
          zip ../../wattson.zip -r ./

      - name: Upload the release
        uses: svenstaro/upload-release-action@master
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./wattson.zip
          asset_name: wattson.zip
          tag: ${{ github.ref }}
          overwrite: true

      - name: Commit version bump back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/wattson/manifest.json
          git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git push origin HEAD:main
